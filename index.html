<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoalSync</title>
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="js/script.js"></script>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <h1>GoalSync</h1>
      <p class="tagline">Plan smart. Stay on track. Achieve more.</p>
    </div>
  </header>

  <!-- Desktop Top Navigation -->
  <nav class="nav-desktop">
    <button data-page="tasks">📑 Tasks</button>
    <button data-page="goals">🎯 Goals</button>
    <button data-page="projects">📂 Projects</button>
    <button data-page="chat">💬 Chat</button>
    <button data-page="dashboard">📊 Dashboard</button>
    <button data-page="invite">📨 Invite</button>
    <button data-page="history">🕒 History</button>
    <button data-page="assistant">🤖 Assistant</button>
    <button data-page="settings">⚙️ Settings</button>
  </nav>

  <!-- Mobile Top Navigation -->
  <nav class="nav-mobile-top">
    <button data-page="tasks">📑</button>
    <button data-page="goals">🎯</button>
    <button data-page="projects">📂</button>
    <button data-page="chat">💬</button>
  </nav>

  <!-- Page Sections -->
  <main>
    <section id="tasks" class="page active">📑 Tasks Page</section>
    <section id="goals" class="page">🎯 Goals Page</section>
    <section id="projects" class="page">📂 Projects Page</section>
    <section id="chat" class="page">💬 Chat Page</section>
    <section id="dashboard" class="page">📊 Dashboard Page</section>
    <section id="invite" class="page">📨 Invite Page</section>
    <section id="history" class="page">🕒 History Page</section>
    <section id="assistant" class="page">🤖 Assistant Page</section>
    <section id="settings" class="page">⚙️ Settings Page</section>
  </main>

  <!-- Mobile Bottom Navigation -->
  <nav class="nav-mobile-bottom">
    <button data-page="dashboard">📊</button>
    <button data-page="invite">📨</button>
    <button data-page="history">🕒</button>
    <button data-page="settings">⚙️</button>
    <button data-page="assistant" class="assistant-btn">🤖</button>
  </nav>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2025 GoalSync</p>
    <span class="version">v2.3+</span>
  </footer>
</body>
</html>
