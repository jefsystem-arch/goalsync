<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoalSync</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="icons/logo.svg" type="image/svg+xml" />
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <h1 class="logo">GoalSync</h1>
    <p class="tagline">Plan smart. Stay on track. Achieve more.</p>
  </header>

  <!-- Top Navigation -->
  <nav class="top-nav">
    <ul>
      <li><a href="#" class="active"><img src="icons/tasks.svg" alt=""> Tasks</a></li>
      <li><a href="#"><img src="icons/goals.svg" alt=""> Goals</a></li>
      <li><a href="#"><img src="icons/projects.svg" alt=""> Projects</a></li>
      <li><a href="#"><img src="icons/chat.svg" alt=""> Chat</a></li>
      <li><a href="#"><img src="icons/settings.svg" alt=""> Settings</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="page-content">
    <section id="tasks">
      <h2>Your Tasks</h2>
      <div class="task-controls">
        <select>
          <option>All Tasks</option>
          <option>Completed</option>
          <option>Pending</option>
        </select>
        <input type="text" placeholder="Search tasks" />
      </div>

      <form class="task-form">
        <input type="text" placeholder="Task title" />
        <input type="date" />
        <input type="time" />
        <select>
          <option>No repeat</option>
          <option>Daily</option>
          <option>Weekly</option>
        </select>
        <input type="text" placeholder="Assign to Goal" />
        <textarea placeholder="Details (optional)"></textarea>
        <input type="text" placeholder="Participants (emails)" />
        <button type="submit">Add Task</button>
      </form>

      <ul class="task-list">
        <li><input type="checkbox" checked> Work on presentation — 10:30 AM</li>
        <li><input type="checkbox" checked> Respond to emails — 9:00 AM</li>
        <li><input type="checkbox"> Exercise at gym — 5:30 PM</li>
      </ul>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <span>v2.3+</span>
    <span>Project by Team Jeff & AI</span>
  </footer>

  <!-- Mobile Bottom Navigation -->
  <nav class="bottom-nav">
    <ul>
      <li><a href="#"><img src="icons/dashboard.svg" alt="Dashboard"></a></li>
      <li><a href="#"><img src="icons/invite.svg" alt="Invite"></a></li>
      <li><a href="#"><img src="icons/history.svg" alt="History"></a></li>
      <li><a href="#"><img src="icons/assistant.svg" alt="Assistant"></a></li>
      <li><a href="#"><img src="icons/settings.svg" alt="Settings"></a></li>
    </ul>
  </nav>
</body>
</html>
