<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoalSync</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="logo">GoalSync</div>
    <div class="tagline">Plan smart. Stay on track. Achieve more.</div>
  </header>

  <!-- Top Navigation -->
  <nav class="top-nav">
    <ul>
      <li class="active"><a href="#">Tasks</a></li>
      <li><a href="#">Goals</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Chat</a></li>
    </ul>
  </nav>

  <!-- Content -->
  <main class="content">
    <h2>Your Tasks</h2>
    <form class="task-form">
      <input type="text" placeholder="Task title" />
      <input type="date" />
      <input type="time" />
      <select>
        <option>No repeat</option>
        <option>Daily</option>
        <option>Weekly</option>
      </select>
      <input type="text" placeholder="Assign to Goal" />
      <textarea placeholder="Details (optional)"></textarea>
      <input type="email" placeholder="Participants (emails)" />
      <button type="submit">Add Task</button>
    </form>

    <ul class="task-list">
      <li><input type="checkbox" checked /> Work on presentation — 10:30 AM</li>
      <li><input type="checkbox" checked /> Respond to emails — 9:00 AM</li>
      <li><input type="checkbox" /> Exercise at gym — 5:30 PM</li>
    </ul>
  </main>

  <!-- Bottom Navigation (only for mobile) -->
  <nav class="bottom-nav">
    <ul>
      <li><a href="#">Dashboard</a></li>
      <li><a href="#">History</a></li>
      <li><a href="#">Invite</a></li>
      <li><a href="#">Settings</a></li>
    </ul>
  </nav>

  <footer class="app-footer">
    v2.3+ • Project by Team Jeff & AI
  </footer>
</body>
</html>
