<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoalSync</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Top Navigation -->
  <header class="top-nav">
    <div class="logo">
      <h1>GoalSync</h1>
      <p>Plan smart. Stay on track. Achieve more.</p>
    </div>
    <ul>
      <li class="nav-item">
        <img src="icons/goals.svg" alt="Goals">
        <span>Goals</span>
      </li>
      <li class="nav-item active">
        <img src="icons/tasks.svg" alt="Tasks">
        <span>Tasks</span>
      </li>
      <li class="nav-item">
        <img src="icons/projects.svg" alt="Projects">
        <span>Projects</span>
      </li>
      <li class="nav-item">
        <img src="icons/chat.svg" alt="Chat">
        <span>Chat</span>
      </li>
    </ul>
  </header>

  <!-- Main Content -->
  <main>
    <section class="tasks">
      <h2>Your Tasks</h2>
      <form>
        <input type="text" placeholder="Task title">
        <input type="date" placeholder="dd/mm/yyyy">
        <input type="time" placeholder="--:--">
        <select>
          <option>No repeat</option>
          <option>Daily</option>
          <option>Weekly</option>
        </select>
        <input type="text" placeholder="Assign to Goal">
        <textarea placeholder="Details (optional)"></textarea>
        <input type="email" placeholder="Participants (emails)">
        <button type="submit">Add Task</button>
      </form>

      <div class="task-card">
        <input type="checkbox" checked>
        <label>Work on presentation — 10:30 AM</label>
      </div>
      <div class="task-card">
        <input type="checkbox" checked>
        <label>Respond to emails — 9:00 AM</label>
      </div>
      <div class="task-card">
        <input type="checkbox">
        <label>Exercise at gym — 5:30 PM</label>
      </div>
    </section>
  </main>

  <!-- Bottom Navigation (Mobile Only) -->
  <nav class="bottom-nav">
    <ul>
      <li class="nav-item">
        <img src="icons/dashboard.svg" alt="Dashboard">
        <span>Dashboard</span>
      </li>
      <li class="nav-item">
        <img src="icons/history.svg" alt="History">
        <span>History</span>
      </li>
      <li class="nav-item assistant">
        <img src="icons/assistant.svg" alt="Assistant">
      </li>
      <li class="nav-item">
        <img src="icons/settings.svg" alt="Settings">
        <span>Settings</span>
      </li>
    </ul>
  </nav>

  <footer>
    <p>v2.3+ • Project by Team Jeff &amp; AI</p>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
