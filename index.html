<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoalSync Test – SVG Nav</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <h1>GoalSync</h1>
      <p class="tagline">Plan smart. Stay on track. Achieve more.</p>
    </div>
  </header>

  <!-- Desktop Navigation (Test: Tasks + Goals only) -->
  <nav class="nav-desktop">
    <button data-page="tasks">
      <!-- Tasks SVG -->
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="9" y1="9" x2="15" y2="9"></line>
        <line x1="9" y1="15" x2="15" y2="15"></line>
      </svg>
      <span>Tasks</span>
    </button>

    <button data-page="goals">
      <!-- Goals SVG -->
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10"></circle>
        <circle cx="12" cy="12" r="3"></circle>
        <line x1="22" y1="2" x2="15" y2="9"></line>
      </svg>
      <span>Goals</span>
    </button>
  </nav>

  <!-- Pages -->
  <main>
    <section id="tasks" class="page active">
      <h2>Tasks Page</h2>
      <p>Testing Apple-style font + SVG icons.</p>
    </section>
    <section id="goals" class="page">
      <h2>Goals Page</h2>
      <p>This is a placeholder for goals.</p>
    </section>
  </main>
</body>
</html>
