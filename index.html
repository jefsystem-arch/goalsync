<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoalSync</title>
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="js/script.js"></script>
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <h1 class="logo">GoalSync</h1>
    <p class="tagline">Plan smart. Stay on track. Achieve more.</p>
  </header>

  <!-- Desktop Navigation -->
  <nav class="nav-desktop">
    <button data-page="tasks"><img src="icons/tasks.svg" alt="" class="icon"> Tasks</button>
    <button data-page="goals"><img src="icons/goals.svg" alt="" class="icon"> Goals</button>
    <button data-page="projects"><img src="icons/projects.svg" alt="" class="icon"> Projects</button>
    <button data-page="chat"><img src="icons/chat.svg" alt="" class="icon"> Chat</button>
    <button data-page="dashboard"><img src="icons/dashboard.svg" alt="" class="icon"> Dashboard</button>
    <button data-page="invite"><img src="icons/invite.svg" alt="" class="icon"> Invite</button>
    <button data-page="history"><img src="icons/history.svg" alt="" class="icon"> History</button>
    <button data-page="assistant"><img src="icons/assistant.svg" alt="" class="icon"> Assistant</button>
    <button data-page="settings"><img src="icons/settings.svg" alt="" class="icon"> Settings</button>
  </nav>

  <!-- Mobile Top Navigation -->
  <nav class="nav-mobile-top">
    <button data-page="tasks"><img src="icons/tasks.svg" alt="" class="icon"> Tasks</button>
    <button data-page="goals"><img src="icons/goals.svg" alt="" class="icon"> Goals</button>
    <button data-page="projects"><img src="icons/projects.svg" alt="" class="icon"> Projects</button>
    <button data-page="chat"><img src="icons/chat.svg" alt="" class="icon"> Chat</button>
  </nav>

  <!-- Mobile Bottom Navigation -->
  <nav class="nav-mobile-bottom">
    <button data-page="dashboard"><img src="icons/dashboard.svg" alt="" class="icon"> Dashboard</button>
    <button data-page="invite"><img src="icons/invite.svg" alt="" class="icon"> Invite</button>
    <button data-page="history"><img src="icons/history.svg" alt="" class="icon"> History</button>
    <button data-page="assistant"><img src="icons/assistant.svg" alt="" class="icon"> Assistant</button>
    <button data-page="settings"><img src="icons/settings.svg" alt="" class="icon"> Settings</button>
  </nav>

  <!-- Main Content -->
  <main>
    <!-- Tasks Page -->
    <section id="tasks" class="page active">
      <h2>Your Tasks</h2>
      <div class="task-controls">
        <select>
          <option>All Tasks</option>
        </select>
        <input type="text" placeholder="Search tasks">
      </div>

      <form class="task-form">
        <input type="text" placeholder="Task title">
        <input type="date">
        <input type="time">
        <select>
          <option>No repeat</option>
          <option>Daily</option>
          <option>Weekly</option>
        </select>
        <input type="text" placeholder="Assign to Goal">
        <textarea placeholder="Details (optional)"></textarea>
        <input type="text" placeholder="Participants (emails)">
        <button type="submit">Add Task</button>
      </form>

      <ul class="task-list">
        <li><input type="checkbox" checked> Work on presentation — 10:30 AM</li>
        <li><input type="checkbox" checked> Respond to emails — 9:00 AM</li>
        <li><input type="checkbox"> Exercise at gym — 5:30 PM</li>
      </ul>
    </section>

    <!-- Placeholder Pages -->
    <section id="goals" class="page">Goals Page</section>
    <section id="projects" class="page">Projects Page</section>
    <section id="chat" class="page">Chat Page</section>
    <section id="dashboard" class="page">Dashboard Page</section>
    <section id="invite" class="page">Invite Page</section>
    <section id="history" class="page">History Page</section>
    <section id="assistant" class="page">Assistant Page</section>
    <section id="settings" class="page">Settings Page</section>
  </main>

  <!-- Footer -->
  <footer>
    <span>v2.3+</span>
    <span>Project by Team Jeff & AI</span>
  </footer>
</body>
</html>
