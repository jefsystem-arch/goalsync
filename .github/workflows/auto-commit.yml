name: Auto Commit Changes

on:
  workflow_dispatch:   # allows manual trigger
  push:
    branches: [ "main" ]   # runs on pushes to main

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.BOT_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "GoalSync Bot"
          git config --global user.email "bot@goalsync.app"

      # Example step: update a timestamp (you can replace this with real updates)
      - name: Example change
        run: echo "Last update: $(date)" >> last-update.log

      - name: Commit and push changes
        run: |
          git add .
          git commit -m "Auto commit by bot" || echo "No changes to commit"
          git push origin main
