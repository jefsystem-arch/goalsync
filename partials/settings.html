<section class="settings-page">
  <h2>⚙️ Settings</h2>

  <!-- Dark Mode -->
  <div class="setting-item">
    <label>
      <input type="checkbox" id="darkModeToggle">
      Dark Mode
    </label>
  </div>

  <!-- Theme Colors -->
  <div class="setting-item">
    <h3>Theme Color</h3>
    <div class="theme-colors">
      <button class="color-btn" data-color="blue" style="background:#2563eb;"></button>
      <button class="color-btn" data-color="green" style="background:#16a34a;"></button>
      <button class="color-btn" data-color="purple" style="background:#7c3aed;"></button>
      <button class="color-btn" data-color="orange" style="background:#ea580c;"></button>
    </div>
  </div>

  <!-- Language -->
  <div class="setting-item">
    <h3>Language</h3>
    <select id="languageSelect">
      <option value="en">English</option>
      <option value="es">Español</option>
      <option value="fr">Français</option>
    </select>
  </div>

  <!-- Profile -->
  <div class="setting-item">
    <h3>Profile & Account</h3>
    <p><strong>Name:</strong> <span id="profileName">John Doe</span></p>
    <p><strong>Email:</strong> <span id="profileEmail">john@example.com</span></p>
  </div>
</section>
