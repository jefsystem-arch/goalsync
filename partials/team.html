<section class="page team-page">
  <header class="page-header">
    <div class="page-icon">👥</div>
    <h1 class="page-title">Team Collaboration</h1>
  </header>

  <div class="page-content">
    <div class="card">
      <h2>Team Members</h2>
      <ul id="teamList">
        <li>You (Owner)</li>
      </ul>
    </div>

    <div class="card">
      <h2>Invite Member</h2>
      <form id="teamInviteForm">
        <input type="email" id="teamInviteEmail" placeholder="Enter team member email" required />
        <button type="submit">Invite</button>
      </form>
    </div>

    <div class="card">
      <h2>Shared Projects</h2>
      <ul id="sharedProjectsList">
        <li>No shared projects yet.</li>
      </ul>
    </div>
  </div>
</section>
