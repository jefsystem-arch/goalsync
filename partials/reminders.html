<section class="page reminders-page">
  <header class="page-header">
    <div class="page-icon">⏰</div>
    <h1 class="page-title">Smart Reminders</h1>
  </header>

  <div class="page-content">
    <div class="card">
      <h2>Your Reminders</h2>
      <ul id="reminderList">
        <li>No reminders yet.</li>
      </ul>
    </div>

    <div class="card">
      <h2>Add Reminder</h2>
      <form id="reminderForm">
        <input type="text" id="reminderText" placeholder="Reminder text" required />
        <input type="datetime-local" id="reminderTime" required />
        <button type="submit">Add</button>
      </form>
    </div>
  </div>
</section>
