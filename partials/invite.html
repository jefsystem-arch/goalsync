<section class="page invite-page">
  <header class="page-header">
    <div class="page-icon">👥</div>
    <h1 class="page-title">Invite</h1>
  </header>

  <div class="page-content">

    <div class="card">
      <h2>Your Referral Code</h2>
      <div class="referral-box">
        <input type="text" id="referralCode" value="GOAL123" readonly />
        <button id="copyReferral">Copy</button>
      </div>
      <p>Share this code with friends and earn rewards when they join.</p>
    </div>

    <div class="card">
      <h2>Invite Friends</h2>
      <form id="inviteForm">
        <input type="email" id="inviteEmail" placeholder="Enter friend's email" required />
        <button type="submit">Send Invite</button>
      </form>
    </div>

    <div class="card">
      <h2>Your Rewards</h2>
      <ul id="rewardsList">
        <li>+1 Month Premium (Invited John)</li>
        <li>+50 Credits (Invited Sarah)</li>
      </ul>
    </div>

  </div>
</section>
