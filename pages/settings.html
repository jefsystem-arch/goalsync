<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoalSync – Settings</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <a href="../index.html" class="back-btn">← Back</a>
    <h1>Settings</h1>
  </header>

  <!-- Content -->
  <main class="content settings-page">

    <!-- Display Settings -->
    <section class="settings-card">
      <h2>Display</h2>
      <div class="option">
        <label for="darkModeToggle">🌙 Dark Mode</label>
        <input type="checkbox" id="darkModeToggle">
      </div>
      <div class="option theme-colors">
        <p>🎨 Theme Color</p>
        <div class="color-swatches">
          <span class="swatch blue active" data-color="blue"></span>
          <span class="swatch green" data-color="green"></span>
          <span class="swatch red" data-color="red"></span>
          <span class="swatch purple" data-color="purple"></span>
          <span class="swatch orange" data-color="orange"></span>
          <span class="swatch teal" data-color="teal"></span>
        </div>
      </div>
    </section>

    <!-- Language -->
    <section class="settings-card">
      <h2>Language</h2>
      <select id="languageSelect">
        <option value="en">English</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="ar">العربية</option>
        <option value="zh">中文</option>
        <option value="hi">हिंदी</option>
      </select>
    </section>

    <!-- Profile & Account -->
    <section class="settings-card">
      <h2>Profile & Account</h2>
      <p><strong>Name:</strong> Jeff</p>
      <p><strong>Email:</strong> jeff@example.com</p>
      <button class="btn">Change Password</button>
      <button class="btn danger">Logout</button>
    </section>

    <!-- Assistant Options -->
    <section class="settings-card">
      <h2>Assistant</h2>
      <div class="option">
        <label for="assistantToggle">Show Floating Assistant</label>
        <input type="checkbox" id="assistantToggle">
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <p>GoalSync v2.4 • Powered by Jeff & AI</p>
  </footer>

  <!-- JS -->
  <script src="../js/settings.js"></script>
</body>
</html>
