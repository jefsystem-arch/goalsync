<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - GoalSync</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">⚡ GoalSync</div>
      <ul class="nav-links">
        <li><a href="../index.html"><img src="../icons/dashboard.svg" alt="Dashboard"> Dashboard</a></li>
        <li><a href="tasks.html"><img src="../icons/tasks.svg" alt="Tasks"> Tasks</a></li>
        <li><a href="goals.html"><img src="../icons/goals.svg" alt="Goals"> Goals</a></li>
        <li><a href="projects.html"><img src="../icons/projects.svg" alt="Projects"> Projects</a></li>
        <li><a href="assistant.html"><img src="../icons/chat.svg" alt="Assistant"> Assistant</a></li>
        <li><a href="settings.html" class="active"><img src="../icons/settings.svg" alt="Settings"> Settings</a></li>
        <li><a href="#" id="logoutBtn"><img src="../icons/logout.svg" alt="Logout"> Logout</a></li>
      </ul>
    </nav>
  </header>

  <main class="content">
    <h1>Settings</h1>

    <section class="appearance-settings">
      <h2>Appearance</h2>

      <label class="toggle">
        <input type="checkbox" id="theme-toggle">
        Enable Dark Mode
      </label>

      <div class="theme-color">
        <label for="color-picker">Theme Color:</label>
        <input type="color" id="color-picker" value="#3b82f6">
      </div>
    </section>
  </main>

  <script src="../js/app.js"></script>
</body>
</html>
