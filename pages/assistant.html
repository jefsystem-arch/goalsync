<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistant - GoalSync</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <main class="container">
    <h1>🤖 Assistant</h1>

    </form>
  </main>

  <script type="module" src="../js/assistant.js"></script>
</body>
</html>
